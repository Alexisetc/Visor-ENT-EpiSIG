# Build + deploy del visor React (webapp-react/) a GitHub Pages.
# URL final: https://alexisetc.github.io/Visor-ENT-EpiSIG/
#
# Disparadores:
#   - push a master  -> redeploy automatico
#   - workflow_dispatch (manual desde la pestana Actions)
#
# Pre-requisito: GitHub Pages debe estar habilitado en
#   Settings -> Pages -> Source: "GitHub Actions"

name: Deploy Vite to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'webapp-react/**'
      - 'webapp/assets/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Solo un deploy a la vez. Cancelar in-progress puede dejar Pages
# en estado raro, asi que lo dejamos correr hasta el final.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp-react/package-lock.json

      - name: Install dependencies
        working-directory: webapp-react
        run: npm ci

      - name: Build
        working-directory: webapp-react
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webapp-react/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  # Purga el cache de jsDelivr (12 h por defecto) para que los datasets
  # actualizados se vean en producción inmediatamente. Sin esto, el
  # visor seguía sirviendo la versión vieja hasta 12 horas tras un
  # deploy con cambios en webapp/assets/.
  purge-cdn:
    name: Purge jsDelivr cache
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Purge dataset URLs
        run: |
          REPO="Alexisetc/Visor-ENT-EpiSIG"
          BASE="https://purge.jsdelivr.net/gh/${REPO}@master/webapp/assets"
          for f in pob_parroquial.json ent_parroquial.json \
                   parroquias_otp_simpl.geojson provincias_otp.geojson \
                   priorizacion_mcda.json mgwr_betas.json \
                   determinantes_parroquial.json estudio_ent.json; do
            echo "→ $f"
            curl -fsS "${BASE}/${f}" || echo "  (purge failed, no critico)"
            echo ""
          done
