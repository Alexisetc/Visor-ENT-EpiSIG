# Build + deploy del visor React (webapp-react/) a GitHub Pages.
# URL final: https://alexisetc.github.io/Visor-ENT-EpiSIG/
#
# Disparadores:
#   - push a master  -> redeploy automatico
#   - workflow_dispatch (manual desde la pestana Actions)
#
# Pre-requisito: GitHub Pages debe estar habilitado en
#   Settings -> Pages -> Source: "GitHub Actions"

name: Deploy Vite to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'webapp-react/**'
      - 'webapp/assets/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Solo un deploy a la vez. Cancelar in-progress puede dejar Pages
# en estado raro, asi que lo dejamos correr hasta el final.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp-react/package-lock.json

      - name: Install dependencies
        working-directory: webapp-react
        run: npm ci

      - name: Build
        working-directory: webapp-react
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webapp-react/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
